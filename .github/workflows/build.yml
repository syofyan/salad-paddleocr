name: Build & Push PaddleOCR-VL Docker

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'server.py'
      - 'start.sh'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: docker.io/kapteng/paddleocr-vl-scan:latest
          cache-from: type=registry,ref=docker.io/kapteng/paddleocr-vl-scan:cache
          cache-to: type=registry,ref=docker.io/kapteng/paddleocr-vl-scan:cache,mode=max
