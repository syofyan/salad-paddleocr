name: Build & Push PaddleOCR-VL Docker

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'server.py'
      - 'start.sh'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo "$DOCKER_PASSWORD" | docker login --username "$DOCKER_USERNAME" --password-stdin

      - name: Build and push
        run: |
          docker buildx build --platform linux/amd64 \
            -t docker.io/kapteng/paddleocr-vl-scan:latest \
            --cache-from type=registry,ref=docker.io/kapteng/paddleocr-vl-scan:cache \
            --cache-to type=registry,ref=docker.io/kapteng/paddleocr-vl-scan:cache,mode=max \
            --push \
            .
